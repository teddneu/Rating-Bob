# MongoDB Configuration
# Cho phép đọc cấu hình từ file .env cục bộ nếu có.
spring.config.import=optional:file:.env[.properties]

# Kết nối Atlas bằng biến môi trường, không lưu password trực tiếp trong repo.
spring.data.mongodb.username=${MONGODB_USERNAME:soc_iu}
spring.data.mongodb.password=${MONGODB_PASSWORD}
spring.data.mongodb.database=${MONGODB_DATABASE:BobServiceDB}
spring.data.mongodb.uri=mongodb+srv://${spring.data.mongodb.username}:${spring.data.mongodb.password}@cluster0.nfg1c7y.mongodb.net/${spring.data.mongodb.database}?retryWrites=true&w=majority&authSource=admin&appName=Cluster0

# Server Configuration  
server.port=${PORT:8082}

# Logging
logging.level.root=INFO
logging.level.org.springframework.data.mongodb=DEBUG    
